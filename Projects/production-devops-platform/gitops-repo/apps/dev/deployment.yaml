apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-platform
  namespace: dev
  labels:
    app: devops-platform
    environment: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-platform
  template:
    metadata:
      labels:
        app: devops-platform
        environment: dev
    spec:
      containers:
      - name: devops-platform
        image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/devops-platform-app:latest
        ports:
        - containerPort: 5000
        env:
        - name: ENVIRONMENT
          value: "development"
        - name: APP_VERSION
          value: "1.0.0"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: devops-platform
  namespace: dev
spec:
  type: LoadBalancer
  selector:
    app: devops-platform
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
